version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: securityvault-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: securityvault
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d securityvault"]
      interval: 5s
      timeout: 5s
      retries: 5